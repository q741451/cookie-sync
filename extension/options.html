<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cookie Channel Sync - 设置</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 620px; margin: 24px auto; padding: 0 16px; color: #222; }
  h2 { font-size: 16px; margin-top: 28px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  h3 { font-size: 13px; color: #555; margin: 14px 0 4px; }
  label { display: block; font-size: 12px; color: #777; margin: 8px 0 3px; }
  input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  button { padding: 8px 14px; margin-top: 8px; cursor: pointer; border: none; border-radius: 4px; background: #2563eb; color: #fff; font-size: 13px; }
  button.secondary { background: #6b7280; }
  button.danger { background: #dc2626; padding: 4px 10px; font-size: 12px; margin: 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
  td, th { padding: 6px 4px; border-bottom: 1px solid #eee; text-align: left; word-break: break-all; }
  fieldset { border: 1px solid #e5e5e5; border-radius: 6px; margin-top: 10px; padding: 10px 12px; }
  fieldset legend { font-size: 12px; color: #555; padding: 0 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #status { margin-top: 16px; font-size: 12px; color: #555; word-break: break-all; white-space: pre-wrap; padding: 8px; background: #f5f5f5; border-radius: 4px; min-height: 16px; }
  .muted { color: #999; font-size: 12px; }
</style>
</head>
<body>
  <h2>我的频道</h2>
  <p class="muted">每个频道各自记录自己的服务器地址——不同频道完全可以属于不同服务器。</p>
  <table id="channelTable">
    <thead><tr><th>显示名</th><th>服务器</th><th>频道名</th><th>密钥</th><th>默认</th><th></th></tr></thead>
    <tbody id="channelTbody"></tbody>
  </table>

  <fieldset>
    <legend>加入已有频道</legend>
    <label>服务器地址</label>
    <input id="joinServerUrl" placeholder="https://your-domain.com">
    <div class="grid2">
      <div>
        <label>频道名</label>
        <input id="joinName" placeholder="小伙伴给你的频道名">
      </div>
      <div>
        <label>频道密钥</label>
        <input id="joinKey" placeholder="小伙伴给你的频道密钥">
      </div>
    </div>
    <label>显示名（可选，方便自己区分，不填就用频道名）</label>
    <input id="joinLabel" placeholder="例如：公司团队">
    <button id="joinBtn" class="secondary">加入</button>
  </fieldset>

  <fieldset>
    <legend>创建新频道</legend>
    <label>服务器地址</label>
    <input id="createServerUrl" placeholder="https://your-domain.com">
    <div class="grid2">
      <div>
        <label>新频道名</label>
        <input id="newChannelName" placeholder="自己起个名字">
      </div>
      <div>
        <label>建频道口令（如站长设置了）</label>
        <input id="registerSecret" placeholder="向站长索要">
      </div>
    </div>
    <label>显示名（可选）</label>
    <input id="createLabel" placeholder="例如：我自己的">
    <button id="createNew" class="secondary">创建</button>
  </fieldset>

  <h2>网站规则</h2>
  <p class="muted">
    不设置规则的网站都走上面选中的"默认"频道。需要走特定频道的网站在这里加规则。
    域名按后缀匹配，比如填 <code>jd.com</code> 会自动匹配 <code>order.jd.com</code>、
    <code>www.jd.com</code> 等所有子域名。
  </p>
  <table id="ruleTable">
    <thead><tr><th>域名（含子域名）</th><th>使用频道</th><th></th></tr></thead>
    <tbody id="ruleTbody"></tbody>
  </table>
  <div class="grid2">
    <div>
      <label>域名</label>
      <input id="ruleDomain" placeholder="例如 jd.com">
    </div>
    <div>
      <label>使用频道</label>
      <select id="ruleChannelSelect"></select>
    </div>
  </div>
  <button id="addRuleBtn" class="secondary">添加规则</button>

  <div id="status"></div>

  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
