<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cookie Channel Sync</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 620px; margin: 24px auto; padding: 0 16px; color: #222; }
  h2 { font-size: 16px; margin-top: 28px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  h3 { font-size: 13px; color: #555; margin: 14px 0 4px; }
  label { display: block; font-size: 12px; color: #777; margin: 8px 0 3px; }
  input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  button { padding: 8px 14px; margin-top: 8px; cursor: pointer; border: none; border-radius: 4px; background: #2563eb; color: #fff; font-size: 13px; }
  button.secondary { background: #6b7280; }
  button.danger { background: #dc2626; padding: 4px 10px; font-size: 12px; margin: 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
  td, th { padding: 6px 4px; border-bottom: 1px solid #eee; text-align: left; word-break: break-all; }
  fieldset { border: 1px solid #e5e5e5; border-radius: 6px; margin-top: 10px; padding: 10px 12px; }
  fieldset legend { font-size: 12px; color: #555; padding: 0 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #status { margin-top: 16px; font-size: 12px; color: #555; word-break: break-all; white-space: pre-wrap; padding: 8px; background: #f5f5f5; border-radius: 4px; min-height: 16px; }
  .muted { color: #999; font-size: 12px; }
</style>
</head>
<body>
  <h2 data-i18n="options_syncHeading"></h2>
  <p class="muted" data-i18n="options_syncDesc"></p>
  <label style="display: flex; align-items: center; gap: 8px; margin: 10px 0;">
    <input type="checkbox" id="syncToggle" style="width: auto;">
    <span data-i18n="options_syncToggleLabel"></span>
  </label>
  <p id="syncStatus" class="muted"></p>

  <h2 data-i18n="options_myChannelsHeading"></h2>
  <p class="muted" data-i18n="options_myChannelsDesc"></p>
  <table id="channelTable">
    <thead>
      <tr>
        <th data-i18n="options_tableLabel"></th>
        <th data-i18n="options_tableServer"></th>
        <th data-i18n="options_tableChannelName"></th>
        <th data-i18n="options_tablePermission"></th>
        <th data-i18n="options_tableKey"></th>
        <th data-i18n="options_tableDefault"></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="channelTbody"></tbody>
  </table>

  <fieldset>
    <legend data-i18n="options_joinLegend"></legend>
    <label data-i18n="options_serverUrlLabel"></label>
    <input id="joinServerUrl" data-i18n-placeholder="options_serverUrlPlaceholder">
    <div class="grid2">
      <div>
        <label data-i18n="options_channelNameLabel"></label>
        <input id="joinName" data-i18n-placeholder="options_joinChannelNamePlaceholder">
      </div>
      <div>
        <label data-i18n="options_channelKeyLabel"></label>
        <input id="joinKey" data-i18n-placeholder="options_joinChannelKeyPlaceholder">
      </div>
    </div>
    <label data-i18n="options_keyTypeLabel"></label>
    <select id="joinKeyType">
      <option value="write" data-i18n="options_keyTypeWrite"></option>
      <option value="read" data-i18n="options_keyTypeRead"></option>
    </select>
    <p class="muted" data-i18n="options_keyTypeHint"></p>
    <label data-i18n="options_labelOptional"></label>
    <input id="joinLabel" data-i18n-placeholder="options_joinLabelPlaceholder">
    <button id="joinBtn" class="secondary" data-i18n="options_joinBtn"></button>
  </fieldset>

  <fieldset>
    <legend data-i18n="options_createLegend"></legend>
    <label data-i18n="options_serverUrlLabel"></label>
    <input id="createServerUrl" data-i18n-placeholder="options_serverUrlPlaceholder">
    <div class="grid2">
      <div>
        <label data-i18n="options_newChannelNameLabel"></label>
        <input id="newChannelName" data-i18n-placeholder="options_newChannelNamePlaceholder">
      </div>
      <div>
        <label data-i18n="options_registerSecretLabel"></label>
        <input id="registerSecret" data-i18n-placeholder="options_registerSecretPlaceholder">
      </div>
    </div>
    <label data-i18n="options_labelOptional"></label>
    <input id="createLabel" data-i18n-placeholder="options_createLabelPlaceholder">
    <button id="createNew" class="secondary" data-i18n="options_createBtn"></button>
  </fieldset>

  <h2 data-i18n="options_rulesHeading"></h2>
  <p class="muted" data-i18n="options_rulesDesc"></p>
  <table id="ruleTable">
    <thead>
      <tr>
        <th data-i18n="options_ruleTableDomain"></th>
        <th data-i18n="options_ruleTableChannel"></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="ruleTbody"></tbody>
  </table>
  <div class="grid2">
    <div>
      <label data-i18n="options_ruleDomainLabel"></label>
      <input id="ruleDomain" data-i18n-placeholder="options_ruleDomainPlaceholder">
    </div>
    <div>
      <label data-i18n="options_ruleChannelLabel"></label>
      <select id="ruleChannelSelect"></select>
    </div>
  </div>
  <button id="addRuleBtn" class="secondary" data-i18n="options_addRuleBtn"></button>

  <div id="status"></div>

  <script src="i18n.js"></script>
  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
